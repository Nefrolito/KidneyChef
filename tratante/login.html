<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KidneyChef — Portal del tratante</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-row">
      <div>
        <h1>KidneyChef</h1>
        <p class="subtitulo">Portal del equipo tratante</p>
      </div>
    </div>
  </header>

  <main>
    <section class="card" style="max-width:420px;margin:2rem auto 0;">
      <h2 id="form-titulo">Iniciar sesión</h2>
      <form id="form-login">
        <div class="campo">
          <label for="email">Correo</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Entrar</button>
        <p class="error-msg" id="error-msg"></p>
        <p class="hint-msg" id="hint-msg"></p>
      </form>
      <p class="hint-msg">
        <a href="#" id="toggle-modo">¿No tienes cuenta? Crear una</a>
      </p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("form-login");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorMsg = document.getElementById("error-msg");
    const hintMsg = document.getElementById("hint-msg");
    const submitBtn = document.getElementById("submit-btn");
    const formTitulo = document.getElementById("form-titulo");
    const toggleModo = document.getElementById("toggle-modo");

    let modoCrearCuenta = false;

    // Si ya hay una sesión guardada, no tiene sentido mostrar el login de
    // nuevo — pero no se valida el token acá (eso lo hace index.html contra
    // el backend); si expiró, api.js redirige de vuelta para acá solo.
    if (tokenActual()) location.href = "index.html";

    toggleModo.addEventListener("click", (e) => {
      e.preventDefault();
      modoCrearCuenta = !modoCrearCuenta;
      formTitulo.textContent = modoCrearCuenta ? "Crear cuenta" : "Iniciar sesión";
      submitBtn.textContent = modoCrearCuenta ? "Crear cuenta" : "Entrar";
      toggleModo.textContent = modoCrearCuenta
        ? "¿Ya tienes cuenta? Iniciar sesión"
        : "¿No tienes cuenta? Crear una";
      errorMsg.textContent = "";
      hintMsg.textContent = "";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";
      hintMsg.textContent = "";
      submitBtn.disabled = true;
      try {
        if (modoCrearCuenta) {
          const resultado = await registrarse(emailInput.value, passwordInput.value);
          if (resultado.confirmado) {
            location.href = "index.html";
          } else {
            hintMsg.textContent = "Cuenta creada. Revisa tu correo para confirmarla y luego inicia sesión.";
            modoCrearCuenta = false;
            formTitulo.textContent = "Iniciar sesión";
            submitBtn.textContent = "Entrar";
            toggleModo.textContent = "¿No tienes cuenta? Crear una";
          }
        } else {
          await iniciarSesion(emailInput.value, passwordInput.value);
          location.href = "index.html";
        }
      } catch (err) {
        errorMsg.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
